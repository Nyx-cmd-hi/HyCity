<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        h1 { text-align: center; }
        input[type='text'] { width: 80%; padding: 10px; margin-bottom: 10px; }
        button { padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 10px; margin: 5px 0; background: white; }
        .completed { text-decoration: line-through; color: gray; }
    </style>
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        <input type="text" id="todo-input" placeholder="Add a new task...">
        <button onclick="addTask()">Add Task</button>
        <ul id="todo-list"></ul>
    </div>
    <script>
        function loadTasks() {
            const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            const todoList = document.getElementById('todo-list');
            todoList.innerHTML = '';
            tasks.forEach((task, index) => {
                const listItem = document.createElement('li');
                listItem.textContent = task.text;
                if (task.completed) {
                    listItem.classList.add('completed');
                }
                listItem.onclick = () => toggleComplete(index);
                todoList.appendChild(listItem);
            });
        }

        function addTask() {
            const input = document.getElementById('todo-input');
            const taskText = input.value;
            if (taskText) {
                const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
                tasks.push({ text: taskText, completed: false });
                localStorage.setItem('tasks', JSON.stringify(tasks));
                input.value = '';
                loadTasks();
            }
        }

        function toggleComplete(index) {
            const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            tasks[index].completed = !tasks[index].completed;
            localStorage.setItem('tasks', JSON.stringify(tasks));
            loadTasks();
        }

        // Load tasks on initial load
        loadTasks();
    </script>
</body>
</html>
